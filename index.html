<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');
:root {
  --bg:#09090e; --s:#101017; --s2:#15151f;
  --bd:rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.11);
  --t:#eeedf8; --mu:#6e6d84; --mu2:#9998b0;
  --ac:#7c6dfa; --ac2:#a78bfa;
  --gr:#2dd4a0; --am:#f5bc4a; --re:#f06b6b; --bl:#5ba3f5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.logo{padding:24px 20px 20px;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;border-bottom:1px solid var(--bd)}
.logo span{color:var(--ac2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;border-bottom:1px solid var(--bd)}
.stat-box{padding:16px;background:var(--s)}
.stat-box:nth-child(2n){background:var(--s2)}
.stat-num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;line-height:1}
.stat-label{font-size:11px;color:var(--mu);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.filters{padding:16px 12px;display:flex;flex-direction:column;gap:6px}
.filter-btn{padding:8px 12px;border-radius:8px;font-size:13px;color:var(--mu);cursor:pointer;border:none;background:none;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.filter-btn:hover{color:var(--t);background:rgba(255,255,255,0.03)}
.filter-btn.active{color:var(--ac2);background:rgba(124,109,250,.1)}
.filter-count{font-family:'IBM Plex Mono',monospace;font-size:11px;opacity:.6}
.setup-box{margin-top:auto;padding:16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:10px}
.setup-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.setup-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--t);font-size:11px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border .15s}
.setup-input:focus{border-color:var(--ac)}
.setup-input::placeholder{color:var(--mu);font-size:10px}
.setup-hint{font-size:10px;color:var(--mu);line-height:1.5;margin-top:3px}
.sync-row{display:flex;align-items:center;justify-content:space-between}
.sync-btn{background:rgba(124,109,250,.15);border:1px solid rgba(124,109,250,.25);color:var(--ac2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.sync-btn:hover{background:rgba(124,109,250,.25)}
.sync-btn:disabled{opacity:.4;cursor:wait}
.last-sync{font-size:10px;color:var(--mu)}
.main{display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{padding:16px 28px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--s)}
.page-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;flex:1}
.search{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;color:var(--t);font-size:13px;font-family:'Inter',sans-serif;width:200px;outline:none;transition:border .15s}
.search:focus{border-color:var(--ac)}
.search::placeholder{color:var(--mu)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:11px;color:var(--mu)}
.scan-btn-top{background:rgba(124,109,250,.15);border:1px solid rgba(124,109,250,.25);color:var(--ac2);border-radius:8px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
.scan-btn-top:hover{background:rgba(124,109,250,.25)}
.scan-btn-top:disabled{opacity:.4;cursor:wait}
.table-wrap{flex:1;overflow-y:auto}
.table-wrap::-webkit-scrollbar{width:4px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:10px 16px;font-size:11px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:2}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,0.015)}
tbody td{padding:0;vertical-align:top}
.row-inner{padding:14px 16px}
.company-block{display:flex;align-items:flex-start;gap:10px}
.avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#fff}
.co-name{font-weight:500;font-size:13px;color:var(--t);line-height:1.3}
.co-role{font-size:12px;color:var(--mu);margin-top:2px;line-height:1.3}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-applied  {background:rgba(91,163,245,.12);color:var(--bl)}
.b-interview{background:rgba(45,212,160,.12);color:var(--gr)}
.b-rejected {background:rgba(240,107,107,.1);color:var(--re)}
.b-offer    {background:rgba(162,139,250,.12);color:var(--ac2)}
.resume-cell{padding:10px 16px 14px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(124,109,250,.1);border:1px dashed rgba(124,109,250,.3);border-radius:8px;padding:7px 14px;color:var(--ac2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;position:relative;overflow:hidden}
.upload-btn:hover{background:rgba(124,109,250,.18);border-style:solid}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.extracted-data{display:flex;flex-direction:column;gap:8px}
.data-section{display:flex;gap:10px;align-items:flex-start}
.data-key{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;min-width:72px;padding-top:2px;flex-shrink:0}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{background:rgba(124,109,250,.1);color:var(--ac2);padding:2px 8px;border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.tag.proj{background:rgba(245,188,74,.08);color:var(--am)}
.bullets-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px}
.bullets-list li{font-size:12px;color:var(--mu2);padding-left:12px;position:relative;line-height:1.5}
.bullets-list li::before{content:"–";position:absolute;left:0;color:var(--ac);opacity:.6}
.extracting-bar{background:rgba(124,109,250,.08);border:1px solid rgba(124,109,250,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ac2);display:flex;align-items:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:13px;height:13px;border:2px solid rgba(162,139,250,.3);border-top-color:var(--ac2);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.empty{text-align:center;padding:80px 20px;color:var(--mu)}
.empty-icon{font-size:40px;opacity:.2;margin-bottom:12px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--s);border:1px solid var(--bd2);border-radius:10px;padding:11px 16px;font-size:13px;transform:translateY(60px);opacity:0;transition:all .2s;z-index:100;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--gr)}
.toast.err{border-left:3px solid var(--re)}
</style>
</head>
<body>
<div class="shell">

<div class="sidebar">
  <div class="logo">Job<span>Track</span></div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" id="s-total" style="color:var(--t)">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-num" id="s-applied" style="color:var(--bl)">0</div><div class="stat-label">Applied</div></div>
    <div class="stat-box"><div class="stat-num" id="s-interview" style="color:var(--gr)">0</div><div class="stat-label">Interviews</div></div>
    <div class="stat-box"><div class="stat-num" id="s-rejected" style="color:var(--re)">0</div><div class="stat-label">Rejected</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('All',this)">All <span class="filter-count" id="fc-all">0</span></button>
    <button class="filter-btn" onclick="setFilter('Applied',this)">Applied <span class="filter-count" id="fc-applied">0</span></button>
    <button class="filter-btn" onclick="setFilter('Interview',this)">Interviews <span class="filter-count" id="fc-interview">0</span></button>
    <button class="filter-btn" onclick="setFilter('Offer',this)">Offers <span class="filter-count" id="fc-offer">0</span></button>
    <button class="filter-btn" onclick="setFilter('Rejected',this)">Rejected <span class="filter-count" id="fc-rejected">0</span></button>
    <button class="filter-btn" onclick="setFilter('no-resume',this)">Missing Resume <span class="filter-count" id="fc-noresume">0</span></button>
  </div>
  <div class="setup-box">
    <div>
      <div class="setup-label">Sheet URL</div>
      <input class="setup-input" id="sheet-url" placeholder="Apps Script Web App URL" oninput="saveConfig()">
    </div>
    <div>
      <div class="setup-label">Groq API Key</div>
      <input class="setup-input" id="api-key" type="password" placeholder="gsk_..." oninput="saveConfig()">
      <div class="setup-hint">Free forever — console.groq.com → API Keys</div>
    </div>
    <div class="sync-row">
      <span class="last-sync" id="last-sync-label">Never synced</span>
      <button class="sync-btn" id="sync-btn" onclick="fetchRows()">Sync</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">All Applications</div>
    <div class="live-dot"></div>
    <span class="live-label">Every 20 min</span>
    <button class="scan-btn-top" id="scan-btn" onclick="triggerScan()">Scan Now</button>
    <input class="search" id="search" placeholder="Search company, role…" oninput="renderTable()">
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:220px">Company / Role</th>
          <th style="width:110px">Status</th>
          <th style="width:100px">Date</th>
          <th>Resume & Extracted Data</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">◈</div>
      <p>No applications yet.<br>Gmail will auto-populate this when confirmation emails arrive.</p>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const SHEET_KEY  = 'jt_sheet_url';
const APIKEY_KEY = 'jt_groq_key';
const GROQ_API   = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

let allRows  = [];
let filter   = 'All';
let knownIds = new Set();
let isFirst  = true;

function saveConfig() {
  localStorage.setItem(SHEET_KEY,  document.getElementById('sheet-url').value.trim());
  localStorage.setItem(APIKEY_KEY, document.getElementById('api-key').value.trim());
}
function getSheetUrl() { return localStorage.getItem(SHEET_KEY)  || ''; }
function getApiKey()   { return localStorage.getItem(APIKEY_KEY) || ''; }

// ── FETCH ROWS ────────────────────────────────────────────────
async function fetchRows() {
  const url = getSheetUrl();
  if (!url) { toast('Paste your Sheet URL in the sidebar', 'err'); return; }
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const res  = await fetch(url);
    const data = await res.json();
    const rows = data.rows || [];
    if (!isFirst) {
      const newIds = new Set(rows.map(r => `${r['Company']}|${r['Role']}`));
      newIds.forEach(id => { if (!knownIds.has(id)) toast(`New: ${id.split('|')[0]}`, 'ok'); });
      knownIds = newIds;
    } else {
      knownIds = new Set(rows.map(r => `${r['Company']}|${r['Role']}`));
    }
    allRows = rows.reverse();
    isFirst = false;
    renderTable();
    updateStats();
    document.getElementById('last-sync-label').textContent =
      'Synced ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    toast('Sync error — check Sheet URL', 'err');
  }
  btn.disabled = false; btn.textContent = 'Sync';
}

// ── SCAN NOW ──────────────────────────────────────────────────
async function triggerScan() {
  const url = getSheetUrl();
  if (!url) { toast('Paste your Sheet URL first', 'err'); return; }
  const btn = document.getElementById('scan-btn');
  btn.textContent = 'Scanning…'; btn.disabled = true;
  try {
    await fetch(url, {
      method: 'POST',
      mode:   'no-cors',
      headers:{ 'Content-Type': 'application/json' },
      body:   JSON.stringify({ action: 'scan' }),
    });
    await new Promise(r => setTimeout(r, 4000));
    await fetchRows();
    toast('Scan complete', 'ok');
  } catch(e) {
    toast('Scan error: ' + e.message, 'err');
  }
  btn.textContent = 'Scan Now'; btn.disabled = false;
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable() {
  const q     = document.getElementById('search').value.toLowerCase().trim();
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  let rows = allRows;
  if (filter === 'no-resume') rows = rows.filter(r => (r['Resume Uploaded']||'NO') === 'NO');
  else if (filter !== 'All')  rows = rows.filter(r => r['Status'] === filter);
  if (q) rows = rows.filter(r =>
    (r['Company']||'').toLowerCase().includes(q) ||
    (r['Role']||'').toLowerCase().includes(q)
  );
  document.getElementById('page-title').textContent =
    filter === 'All' ? 'All Applications' :
    filter === 'no-resume' ? 'Missing Resume' : filter;
  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map((r, i) => {
    const company    = r['Company'] || '?';
    const role       = r['Role'] || '?';
    const status     = r['Status'] || 'Applied';
    const date       = r['Date Added'] ? new Date(r['Date Added']).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
    const hasResume  = (r['Resume Uploaded']||'NO') === 'YES';
    const rowKey     = encodeURIComponent(`${company}|||${role}`);
    const badgeClass = {Applied:'b-applied',Interview:'b-interview',Rejected:'b-rejected',Offer:'b-offer'}[status]||'b-applied';
    const skills     = (r['Skills']||'').split(',').map(s=>s.trim()).filter(Boolean);
    const projects   = (r['Projects']||'').split(',').map(s=>s.trim()).filter(Boolean);
    const exp        = r['Experience'] || '';
    const bullets    = parseBullets(r['Bullet Points']||'');

    const resumeSection = hasResume ? `
      <div class="extracted-data">
        ${skills.length ? `<div class="data-section"><span class="data-key">Skills</span><div class="tags">${skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div></div>` : ''}
        ${projects.length ? `<div class="data-section"><span class="data-key">Projects</span><div class="tags">${projects.map(p=>`<span class="tag proj">${esc(p)}</span>`).join('')}</div></div>` : ''}
        ${exp ? `<div class="data-section"><span class="data-key">Experience</span><div style="font-size:12px;color:var(--mu2)">${esc(exp)}</div></div>` : ''}
        ${bullets.length ? `<div class="data-section"><span class="data-key">Bullets</span><ul class="bullets-list">${bullets.slice(0,5).map(b=>`<li>${esc(b)}</li>`).join('')}${bullets.length>5?`<li style="color:var(--mu)">+${bullets.length-5} more…</li>`:''}</ul></div>` : ''}
      </div>` : `
      <label class="upload-btn" id="ubtn-${i}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0"><path d="M7 1v8M4 4l3-3 3 3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Upload Resume PDF
        <input type="file" accept=".pdf" onchange="handleUpload(event,'${rowKey}',${i})">
      </label>`;

    return `<tr id="row-${i}">
      <td><div class="row-inner">
        <div class="company-block">
          <div class="avatar" style="background:${avatarColor(company)}">${company.slice(0,2).toUpperCase()}</div>
          <div><div class="co-name">${esc(company)}</div><div class="co-role">${esc(role)}</div></div>
        </div>
      </div></td>
      <td><div class="row-inner"><span class="badge ${badgeClass}">${status}</span></div></td>
      <td><div class="row-inner" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mu)">${date}</div></td>
      <td><div class="resume-cell" id="rcell-${i}">${resumeSection}</div></td>
    </tr>`;
  }).join('');
}

// ── HANDLE UPLOAD ─────────────────────────────────────────────
async function handleUpload(event, rowKey, idx) {
  const file = event.target.files[0];
  if (!file) return;
  const [company, role] = decodeURIComponent(rowKey).split('|||');
  const cell = document.getElementById(`rcell-${idx}`);
  cell.innerHTML = `<div class="extracting-bar"><div class="spin"></div> Reading resume with AI…</div>`;
  try {
    const text      = await extractTextFromPDF(file);
    const extracted = await extractWithGroq(text);
    await pushToSheet(company, role, extracted);
    const rowData = allRows.find(r =>
      (r['Company']||'').toLowerCase() === company.toLowerCase() &&
      (r['Role']||'').toLowerCase().slice(0,30) === role.toLowerCase().slice(0,30)
    );
    if (rowData) {
      rowData['Skills']          = extracted.skills;
      rowData['Projects']        = extracted.projects;
      rowData['Experience']      = extracted.experience;
      rowData['Bullet Points']   = extracted.bullets;
      rowData['Resume Uploaded'] = 'YES';
    }
    renderTable();
    updateStats();
    toast(`Resume saved for ${company}`, 'ok');
  } catch(e) {
    cell.innerHTML = `<div style="font-size:12px;color:var(--re);padding:8px">Error: ${esc(e.message)}</div>`;
    toast('Error: ' + e.message, 'err');
  }
}

// ── EXTRACT TEXT FROM PDF ─────────────────────────────────────
async function extractTextFromPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += content.items.map(item => item.str).join(' ') + '\n';
  }
  return fullText.trim();
}

// ── EXTRACT VIA GROQ ──────────────────────────────────────────
async function extractWithGroq(resumeText) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('Paste your Groq API key in the sidebar first');
  const res = await fetch(GROQ_API, {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [
        {
          role: 'system',
          content: `You are a resume parser. Return ONLY a JSON object, no markdown, no explanation:
{
  "skills": "comma-separated technical skills",
  "projects": "comma-separated project names only",
  "experience": "Title @ Company (dates) separated by | for each role",
  "bullets": ["every bullet point verbatim from the entire resume"]
}`
        },
        {
          role: 'user',
          content: `Parse this resume:\n\n${resumeText.slice(0, 6000)}`
        }
      ],
      temperature: 0.1,
      max_tokens:  2000,
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text   = data.choices?.[0]?.message?.content || '{}';
  const clean  = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  return {
    skills:     parsed.skills || '',
    projects:   parsed.projects || '',
    experience: parsed.experience || '',
    bullets:    Array.isArray(parsed.bullets) ? JSON.stringify(parsed.bullets) : '[]',
  };
}

// ── PUSH TO SHEET ─────────────────────────────────────────────
async function pushToSheet(company, role, data) {
  const url = getSheetUrl();
  if (!url) throw new Error('Sheet URL not set');
  await fetch(url, {
    method: 'POST',
    mode:   'no-cors',
    headers:{ 'Content-Type': 'application/json' },
    body:   JSON.stringify({ company, role, ...data }),
  });
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  const count    = s => allRows.filter(r => r['Status'] === s).length;
  const noResume = allRows.filter(r => (r['Resume Uploaded']||'NO') === 'NO').length;
  document.getElementById('s-total').textContent      = allRows.length;
  document.getElementById('s-applied').textContent    = count('Applied');
  document.getElementById('s-interview').textContent  = count('Interview');
  document.getElementById('s-rejected').textContent   = count('Rejected');
  document.getElementById('fc-all').textContent       = allRows.length;
  document.getElementById('fc-applied').textContent   = count('Applied');
  document.getElementById('fc-interview').textContent = count('Interview');
  document.getElementById('fc-offer').textContent     = count('Offer');
  document.getElementById('fc-rejected').textContent  = count('Rejected');
  document.getElementById('fc-noresume').textContent  = noResume;
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

// ── UTILS ─────────────────────────────────────────────────────
const COLORS = ['#7c6dfa','#e879a0','#2dd4a0','#f5bc4a','#5ba3f5','#f06b6b','#a78bfa','#34d3a0','#f59e0b','#60a5fa'];
function avatarColor(name) {
  let h = 0;
  for (const c of (name||'A')) h = (h*31+c.charCodeAt(0)) % COLORS.length;
  return COLORS[Math.abs(h) % COLORS.length];
}
function parseBullets(raw) {
  if (!raw) return [];
  try { const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }
  catch { return raw.split('\n').filter(Boolean); }
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3200);
}

// ── BOOT ──────────────────────────────────────────────────────
document.getElementById('sheet-url').value = getSheetUrl();
document.getElementById('api-key').value   = getApiKey();
setInterval(fetchRows, 1200000);
fetchRows();
</script>
